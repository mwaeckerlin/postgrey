pidfile "/var/run/milter-greylist/milter-greylist.pid"
dumpfile "/var/lib/milter-greylist/greylist.db" 600
dumpfreq 1
user "smmsp"
quiet
stat "|cat" "%T{%Y/%m/%d %T} %d [%i] %f -> %r %S (ACL %A) %Xc %Xe %Xm"

# Greylisting is an INBOUND anti-spam measure — mail from our own users and
# internal services must never be greylisted. This is the milter equivalent of
# the former "permit_sasl_authenticated, permit_mynetworks" that preceded the
# postgrey policy check in smtpd_recipient_restrictions.
racl whitelist auth /.*/
racl whitelist addr 127.0.0.0/8
racl whitelist addr 10.0.0.0/8
racl whitelist addr 172.16.0.0/12
racl whitelist addr 192.168.0.0/16

# No explicit "racl greylist default" — it would disable the built-in
# auto-whitelist, so known senders would be re-greylisted on every mail.
# Everything not whitelisted above is greylisted by the implicit default.
